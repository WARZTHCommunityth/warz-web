<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WarZ TH Limited Edition Give Away</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #E8A900;
    --gold-light: #FFD84D;
    --gold-dim: #8B6200;
    --red: #C0392B;
    --red-dark: #7B1A10;
    --bg-dark: #0A0A0A;
    --bg-card: rgba(15,10,5,0.85);
    --text: #F0E8D0;
    --text-dim: #9A8A6A;
  }

  html, body {
    min-height: 100vh;
    font-family: 'Kanit', sans-serif;
    background: var(--bg-dark);
    color: var(--text);
  }

  /* === BACKGROUND === */
  .bg-wrap {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }
  .bg-img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: brightness(0.28) saturate(0.7);
  }
  .bg-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.3) 0%,
      rgba(5,2,0,0.55) 40%,
      rgba(10,4,0,0.85) 100%
    );
  }
  .bg-vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
  }

  /* === LAYOUT === */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  /* === LOGO AREA === */
  .logo-area {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .logo-title {
    font-size: clamp(2rem, 6vw, 3.6rem);
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1;
    color: #fff;
    text-shadow:
      0 0 20px rgba(232,169,0,0.6),
      2px 2px 0 #5A3200,
      4px 4px 0 #3A1E00;
  }
  .logo-title span {
    color: var(--gold);
  }
  .logo-sub {
    display: inline-block;
    margin-top: 6px;
    font-size: clamp(0.75rem, 2vw, 1rem);
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold-light);
    border-top: 1px solid var(--gold-dim);
    border-bottom: 1px solid var(--gold-dim);
    padding: 4px 16px;
  }

  /* === REWARD BADGE === */
  .reward-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 0.75rem 0 1.5rem;
    padding: 10px 28px;
    background: linear-gradient(135deg, #4A2800 0%, #1A0A00 50%, #4A2800 100%);
    border: 1px solid var(--gold);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  .reward-badge::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(232,169,0,0.08), transparent);
  }
  .reward-gc {
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 900;
    color: var(--gold-light);
    letter-spacing: 0.02em;
    line-height: 1;
    text-shadow: 0 0 12px rgba(255,216,77,0.5);
  }
  .reward-gc span {
    font-size: 0.45em;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.1em;
    vertical-align: middle;
    margin-left: 4px;
  }
  .reward-label {
    font-size: clamp(0.85rem, 2vw, 1rem);
    font-weight: 600;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .reward-divider {
    width: 1px;
    height: 48px;
    background: var(--gold-dim);
    opacity: 0.6;
  }

  /* === FORM CARD === */
  .form-card {
    width: 100%;
    max-width: 460px;
    background: var(--bg-card);
    border: 1px solid rgba(232,169,0,0.3);
    border-radius: 4px;
    padding: 2rem 2rem 1.75rem;
    backdrop-filter: blur(10px);
    position: relative;
  }
  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .form-title {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.5rem;
    text-align: center;
  }

  /* === FIELDS === */
  .field {
    margin-bottom: 1.1rem;
  }
  .field label {
    display: block;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    height: 46px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(232,169,0,0.25);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Kanit', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    padding: 0 14px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .field input::placeholder {
    color: rgba(155,138,106,0.5);
    font-weight: 300;
  }
  .field input:focus {
    border-color: var(--gold);
    background: rgba(232,169,0,0.06);
  }

  /* === SUBMIT === */
  .submit-btn {
    width: 100%;
    height: 50px;
    margin-top: 0.5rem;
    background: linear-gradient(135deg, #C07A00 0%, #E8A900 45%, #C07A00 100%);
    border: none;
    border-radius: 3px;
    color: #1A0800;
    font-family: 'Kanit', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: filter 0.2s, transform 0.1s;
  }
  .submit-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }
  .submit-btn:hover::before { transform: translateX(100%); }
  .submit-btn:hover { filter: brightness(1.1); }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:disabled { filter: brightness(0.5); cursor: not-allowed; }

  /* === STATUS === */
  .status-box {
    display: none;
    margin-top: 1rem;
    padding: 10px 14px;
    border-radius: 2px;
    font-size: 0.88rem;
    font-weight: 400;
    letter-spacing: 0.03em;
    text-align: center;
  }
  .status-box.success {
    background: rgba(0,80,30,0.4);
    border: 1px solid rgba(50,200,100,0.4);
    color: #6FE8A0;
  }
  .status-box.error {
    background: rgba(100,10,10,0.4);
    border: 1px solid rgba(200,60,60,0.4);
    color: #F08080;
  }

  /* === SCRIPT URL === */
  .config-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .config-row input {
    flex: 1;
    height: 38px;
    background: rgba(255,255,255,0.03);
    border: 1px dashed rgba(232,169,0,0.2);
    border-radius: 2px;
    color: var(--text-dim);
    font-family: 'Kanit', sans-serif;
    font-size: 0.78rem;
    padding: 0 10px;
    outline: none;
  }
  .config-row input:focus { border-color: var(--gold-dim); }
  .config-btn {
    height: 38px;
    padding: 0 14px;
    background: rgba(232,169,0,0.12);
    border: 1px solid rgba(232,169,0,0.3);
    border-radius: 2px;
    color: var(--gold);
    font-family: 'Kanit', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
  }
  .config-btn:hover { background: rgba(232,169,0,0.22); }
  .config-label {
    font-size: 0.72rem;
    color: var(--gold-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  /* === FOOTER === */
  .footer-note {
    margin-top: 1.25rem;
    text-align: center;
    font-size: 0.75rem;
    color: rgba(155,138,106,0.45);
    letter-spacing: 0.06em;
  }

  /* === SCRATCH LINES (decoration) === */
  .scratch {
    position: absolute;
    pointer-events: none;
    opacity: 0.07;
  }

  @media (max-width: 500px) {
    .form-card { padding: 1.5rem 1.25rem; }
    .reward-badge { padding: 8px 16px; gap: 8px; }
  }
</style>
</head>
<body>

<div class="bg-wrap">
  <img class="bg-img" src="ChatGPT_Image_23_ม__ย__2569_23_48_59.png" alt="" aria-hidden="true" onerror="this.style.display='none'">
  <div class="bg-overlay"></div>
  <div class="bg-vignette"></div>
</div>

<main class="page">

  <!-- LOGO -->
  <div class="logo-area">
    <div class="logo-title">WAR<span>Z</span> TH</div>
    <div class="logo-sub">Limited Edition &nbsp;·&nbsp; Community Thailand</div>
  </div>

  <!-- REWARD -->
  <div class="reward-badge">
    <div style="text-align:center;">
      <div class="reward-gc">1,000<span>GC</span></div>
    </div>
    <div class="reward-divider"></div>
    <div style="text-align:left;">
      <div style="font-size:1.1rem; font-weight:700; color:#fff; line-height:1.2;">แจกฟรี!</div>
      <div class="reward-label">ลุ้นรับ GC ทันที</div>
    </div>
  </div>

  <!-- FORM -->
  <div class="form-card">

    <div class="form-title">กรอกข้อมูลเพื่อรับรางวัล</div>

    <!-- Script URL config -->
    <div>
      <div class="config-label">🔧 Google Apps Script URL</div>
      <div class="config-row">
        <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/..." />
        <button class="config-btn" onclick="saveUrl()">บันทึก</button>
      </div>
    </div>

    <!-- Fields -->
    <div class="field">
      <label for="hofid">HOF ID</label>
      <input type="text" id="hofid" placeholder="กรอก HOF ID ของคุณ" autocomplete="off" />
    </div>

    <div class="field">
      <label for="gamecode">รหัสเกม</label>
      <input type="text" id="gamecode" placeholder="กรอกรหัสเกม" autocomplete="off" />
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitForm()">
      ยืนยันการลงทะเบียน
    </button>

    <div class="status-box" id="statusBox"></div>

    <div class="footer-note">WarZ TH &nbsp;·&nbsp; Limited Edition Give Away &nbsp;·&nbsp; ข้อมูลของคุณจะถูกเก็บอย่างปลอดภัย</div>
  </div>

</main>

<script>
  let scriptUrl = '';

  function saveUrl() {
    const v = document.getElementById('scriptUrl').value.trim();
    if (v) {
      scriptUrl = v;
      showStatus('✔ บันทึก URL เรียบร้อย พร้อมรับข้อมูลแล้ว', 'success');
    } else {
      showStatus('กรุณาใส่ URL ก่อนบันทึก', 'error');
    }
  }

  async function submitForm() {
    const hofid   = document.getElementById('hofid').value.trim();
    const gamecode = document.getElementById('gamecode').value.trim();

    if (!hofid || !gamecode) {
      showStatus('กรุณากรอกข้อมูลให้ครบทุกช่อง', 'error');
      return;
    }
    if (!scriptUrl) {
      showStatus('กรุณาใส่และบันทึก Google Apps Script URL ก่อนครับ', 'error');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'กำลังส่งข้อมูล...';

    try {
      const ts = new Date().toLocaleString('th-TH');
      const params = new URLSearchParams({ hofid, gamecode, timestamp: ts });
      await fetch(scriptUrl + '?' + params.toString(), { method: 'GET', mode: 'no-cors' });
      showStatus('✔ ลงทะเบียนสำเร็จ! ข้อมูลส่งไปยัง Google Sheets แล้ว รอลุ้นรางวัลได้เลย!', 'success');
      document.getElementById('hofid').value = '';
      document.getElementById('gamecode').value = '';
    } catch (e) {
      showStatus('เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง', 'error');
    }

    btn.disabled = false;
    btn.textContent = 'ยืนยันการลงทะเบียน';
  }

  function showStatus(msg, type) {
    const box = document.getElementById('statusBox');
    box.textContent = msg;
    box.className = 'status-box ' + type;
    box.style.display = 'block';
    if (type === 'success') {
      setTimeout(() => { box.style.display = 'none'; }, 5000);
    }
  }
</script>

</body>
</html>
